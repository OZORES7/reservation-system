   <div class="signin"> 
    <div class="content"> 
     <h2>Sign In</h2> 
     <div class="form"> 
      <form onsubmit="return validateForm(event)">
       <div class="inputBox"> 
        <input type="text" id="username" required> <i>Username</i> 
       </div> 
       <div class="inputBox"> 
        <input type="password" id="password" required> <i>Password</i> 
       </div> 
       <div class="links"> 
        <div class="links"> 
  <a href="forgetpass.html">Forgot Password</a> 
  <a href="signup.html">Signup</a> 
</div>
       </div> 
       <div class="inputBox"> 
        <input type="submit" value="Login"> 
       </div>
      </form>
     </div> 
    </div> 
   </div> 
  </section>
  <script>
  async function validateForm(event) {
    event.preventDefault();
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;
    if (username.trim() === '' || password.trim() === '') {
      alert('Please fill in both username and password');
      return false;
    }

    try {
      var response = await fetch('http://127.0.0.1:8000/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      });

      var data = await response.json();
      if (!response.ok) {
        alert(data.detail || 'Login failed');
        return false;
      }

      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('user_id', data.user.id);
      window.location.href = 'main.html';
    } catch (error) {
      alert('Cannot connect to API. Make sure FastAPI server is running.');
    }

    return false;
  }
  </script>
