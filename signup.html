   <div class="signin"> 
    <div class="content"> 
     <h2>Sign Up</h2> 
     <div class="form"> 
      <form onsubmit="return validateForm(event)">
       <div class="inputBox"> 
        <input type="text" id="username" required> <i>Username</i> 
       </div>
       <div class="inputBox"> 
        <input type="email" id="email" required> <i>Email</i> 
       </div> 
       <div class="inputBox"> 
        <input type="password" id="password" required> <i>Password</i> 
       </div> 
       <div class="inputBox"> 
        <input type="submit" value="Sign Up"> 
       </div>
       <div class="signin-link">
        <a href="login.html">Already have an account? Sign In</a>
       </div>
      </form>
     </div> 
    </div> 
   </div> 
  </section>
  <script>
  async function validateForm(event) {
    event.preventDefault();
    var username = document.getElementById('username').value;
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    if (username.trim() === '' || email.trim() === '' || password.trim() === '') {
      alert('Please fill in all fields');
      return false;
    }
    if (!email.includes('@') || !email.includes('.')) {
      alert('Please enter a valid email address');
      return false;
    }

    try {
      var response = await fetch('http://127.0.0.1:8000/auth/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: username,
          email: email,
          password: password
        })
      });

      var data = await response.json();
      if (!response.ok) {
        alert(data.detail || 'Signup failed');
        return false;
      }

      alert('Signup successful. Please login.');
      window.location.href = 'login.html';
    } catch (error) {
      alert('Cannot connect to API. Make sure FastAPI server is running.');
    }

    return false;
  }
  </script>
